image: openjdk:17-jdk-slim

variables:
  ANDROID_SDK_ROOT: "/android-sdk"
  ANDROID_COMPILE_SDK: "34"
  ANDROID_BUILD_TOOLS: "34.0.0"
  ANDROID_SDK_TOOLS_VERSION: "11076708"

stages:
  - build

before_script:
  - apt-get update -qq && apt-get install -y wget unzip curl
  - wget -q https://dl.google.com/android/repository/commandlinetools-linux-${ANDROID_SDK_TOOLS_VERSION}_latest.zip -O android-sdk-tools.zip
  - mkdir -p ${ANDROID_SDK_ROOT}/cmdline-tools
  - unzip -q android-sdk-tools.zip -d ${ANDROID_SDK_ROOT}/cmdline-tools
  - mv ${ANDROID_SDK_ROOT}/cmdline-tools/cmdline-tools ${ANDROID_SDK_ROOT}/cmdline-tools/latest
  - export PATH=${PATH}:${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin:${ANDROID_SDK_ROOT}/platform-tools
  - yes | sdkmanager --licenses > /dev/null 2>&1 || true
  - sdkmanager "platforms;android-${ANDROID_COMPILE_SDK}" "build-tools;${ANDROID_BUILD_TOOLS}" > /dev/null 2>&1
  - chmod +x ./gradlew

build_apk:
  stage: build
  script:
    - ./gradlew assembleDebug --stacktrace
  artifacts:
    name: "MyDocReader-APK"
    paths:
      - app/build/outputs/apk/debug/app-debug.apk
    expire_in: 30 days
  only:
    - main
