          EOF

          cat > app/src/main/res/layout/activity_text_viewer.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <ScrollView xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:padding="16dp">
              <TextView android:id="@+id/textContent" android:layout_width="match_parent" android:layout_height="wrap_content" android:textSize="14sp" android:fontFamily="monospace"/>
          </ScrollView>
          EOF

          cat > app/src/main/res/layout/activity_image_viewer.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android" android:layout_width="match_parent" android:layout_height="match_parent" android:background="#000">
              <ImageView android:id="@+id/imageView" android:layout_width="match_parent" android:layout_height="match_parent" android:scaleType="fitCenter"/>
          </FrameLayout>
          EOF

          cat > app/src/main/res/layout/item_recent_file.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <androidx.cardview.widget.CardView xmlns:android="http://schemas.android.com/apk/res/android" xmlns:app="http://schemas.android.com/apk/res-auto" android:layout_width="match_parent" android:layout_height="wrap_content" android:layout_marginBottom="8dp" app:cardCornerRadius="8dp" app:cardElevation="2dp">
              <LinearLayout android:layout_width="match_parent" android:layout_height="wrap_content" android:orientation="horizontal" android:padding="12dp" android:gravity="center_vertical">
                  <ImageView android:id="@+id/fileIcon" android:layout_width="40dp" android:layout_height="40dp" android:padding="4dp"/>
                  <LinearLayout android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:orientation="vertical" android:paddingStart="12dp">
                      <TextView android:id="@+id/fileName" android:layout_width="match_parent" android:layout_height="wrap_content" android:textSize="15sp" android:textStyle="bold" android:ellipsize="end" android:maxLines="1"/>
                      <TextView android:id="@+id/filePath" android:layout_width="match_parent" android:layout_height="wrap_content" android:textSize="11sp" android:ellipsize="start" android:maxLines="1"/>
                  </LinearLayout>
              </LinearLayout>
          </androidx.cardview.widget.CardView>
          EOF

      - name: Install Gradle Wrapper
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.1.1'

      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MyDocReader-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
